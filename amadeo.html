<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Management - Diamondland</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', sans-serif; }
        .gold-text { color: #f1c40f; }
        .card-dark { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .card-dark:hover { border-color: #f1c40f; }
        
        .input-dark { 
            background: #1a1a1a !important; 
            border: 1px solid #333 !important; 
            color: white !important; 
        }
        .input-dark::placeholder { color: #888 !important; }
        .input-dark:focus { 
            background: #222 !important; 
            border-color: #f1c40f !important; 
            color: white !important; 
            box-shadow: none; 
        }
        
        select.input-dark option { background: #1a1a1a; color: white; }

        .modal-content { background: #161616; color: white; border: 1px solid #f1c40f; }
        .badge-paid { background: #28a745; padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        #undoToast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; display: none; background: #333; color: white; padding: 15px; border-radius: 10px; border: 1px solid #f1c40f; }
        
        @media print { 
            body * { visibility: hidden; } 
            #printArea, #printArea * { visibility: visible; } 
            #printArea { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; padding: 40px; } 
            .no-print { display: none; } 
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="title" class="gold-text fw-bold">...</h2>
            <a href="dashboard.html" class="btn btn-outline-warning btn-sm">← Dashboard</a>
        </div>

        <div class="card-dark" style="cursor: default;">
            <h5 class="gold-text">New Payment</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="small text-muted">Client (B/L)</label>
                    <select id="clientSel" class="form-select input-dark"></select>
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">Amount</label>
                    <input id="amt" type="number" class="form-control input-dark" placeholder="₱ 0.00">
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">Payment Date</label>
                    <input id="payDate" type="date" class="form-control input-dark">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button id="payBtn" class="btn btn-warning w-100 fw-bold">POST</button>
                </div>
            </div>
        </div>

        <h4 class="mb-3 mt-4">Client List</h4>
        <div id="list"></div>
    </div>

    <div id="undoToast">
        Client Deleted. <button class="btn btn-warning btn-sm fw-bold ms-3" onclick="undoDelete()">UNDO</button>
    </div>

    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-lg"><div class="modal-content"><div id="printArea">
            <div class="modal-header border-secondary">
                <h4 class="modal-title gold-text" id="modalName">Details</h4>
                <button type="button" class="btn-close btn-close-white no-print" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="statusBig" class="text-center mb-3"></div>
                <div class="row">
                    <div class="col-6">
                        <p>Property: <span id="modalProject" class="fw-bold text-warning"></span></p>
                        <p>B/L: <span id="modalBL" class="fw-bold"></span></p>
                        <p>Lot Area: <span id="modalArea" class="fw-bold text-info"></span> sqm</p>
                        <p>Monthly Terms: <span id="modalTerm" class="fw-bold"></span> Mos</p>
                    </div>
                    <div class="col-6 text-end">
                        <p>Paid: <span id="modalPaid" class="text-success fw-bold"></span></p>
                        <p>Total TCP: <span id="modalTotal" class="fw-bold"></span></p>
                        <p>Balance: <span id="modalBalance" class="text-danger fw-bold"></span></p>
                        <p>Paid Until: <span id="modalPaidUntil" class="fw-bold text-info"></span></p>
                    </div>
                </div>
                <hr class="border-secondary"><h6>Payment History:</h6><div id="logs"></div>
            </div></div>
            <div class="modal-footer border-secondary no-print"><button class="btn btn-warning w-100 fw-bold" onclick="window.print()">🖨️ PRINT RECORD</button></div>
        </div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc, getDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const PROPERTY_NAME = "Amadeo"; 
        const firebaseConfig = { apiKey: "AIzaSyAY-MhEi5XevlyqsmZHcuAxVYhnP_gsxqI", projectId: "payment-tracker-3f604" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const modal = new bootstrap.Modal(document.getElementById('historyModal'));
        
        let lastDeleted = null;
        document.getElementById('title').innerText = PROPERTY_NAME + " Property";
        document.getElementById('payDate').valueAsDate = new Date();

        function calculatePaidUntil(regDate, monthly, totalPaid) {
            if (!totalPaid || totalPaid <= 0 || !monthly || monthly <= 0) return "No payment yet";
            const monthsCovered = Math.floor(totalPaid / monthly);
            const start = regDate ? new Date(regDate) : new Date();
            const until = new Date(start);
            until.setMonth(start.getMonth() + (monthsCovered - 1));
            return until.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
        }

        async function load() {
            const q = query(collection(db, "clients"), where("location", "==", PROPERTY_NAME));
            const snap = await getDocs(q); 
            const list = document.getElementById('list'); 
            const sel = document.getElementById('clientSel');
            list.innerHTML = ""; sel.innerHTML = '<option value="">Choose Client...</option>';
            
            snap.forEach(docSnap => {
                const c = docSnap.data(); 
                const id = docSnap.id; 
                const bal = c.total - c.paid;
                const paidUntil = calculatePaidUntil(c.registrationDate, c.monthly, c.paid);

                sel.innerHTML += `<option value="${id}">${c.name} (B${c.block} L${c.lot})</option>`;
                list.innerHTML += `<div class="card-dark d-flex justify-content-between align-items-center shadow-sm">
                    <div onclick="showHistory('${id}')" style="flex-grow:1">
                        <b class="${bal <= 0 ? 'text-success' : 'gold-text'}" style="font-size:1.1rem">${c.name}</b><br>
                        <small class="text-white-50">Project: <b>${c.projectName || 'Not Specified'}</b></small><br>
                        <small>B${c.block} L${c.lot} | Area: ${c.lotArea || 0} sqm</small><br>
                        <span class="text-info small fw-bold">Paid Until: ${paidUntil}</span><br>
                        ${bal <= 0 ? '<span class="badge-paid mt-1 d-inline-block">FULLY PAID</span>' : ''}
                    </div>
                    <div class="text-end me-3" onclick="showHistory('${id}')">
                        ₱${c.paid.toLocaleString()} / ₱${c.total.toLocaleString()}<br>
                        <small class="text-danger">Bal: ₱${bal.toLocaleString()}</small>
                    </div>
                    <button class="btn btn-outline-danger btn-sm no-print border-0" onclick="confirmDelete('${id}','${c.name}')">🗑️</button>
                </div>`;
            });
        }

        window.showHistory = async (id) => {
            const res = await getDoc(doc(db, "clients", id)); 
            const c = res.data(); 
            const bal = c.total - c.paid;
            const paidUntil = calculatePaidUntil(c.registrationDate, c.monthly, c.paid);
            
            document.getElementById('modalName').innerText = c.name;
            document.getElementById('modalProject').innerText = c.projectName || 'Not Specified';
            document.getElementById('modalBL').innerText = `Block ${c.block} Lot ${c.lot}`;
            document.getElementById('modalArea').innerText = c.lotArea || 0;
            document.getElementById('modalTerm').innerText = c.termsMonths;
            document.getElementById('modalTotal').innerText = "₱"+c.total.toLocaleString();
            document.getElementById('modalPaid').innerText = "₱"+c.paid.toLocaleString();
            document.getElementById('modalBalance').innerText = "₱"+bal.toLocaleString();
            document.getElementById('modalPaidUntil').innerText = paidUntil;
            document.getElementById('statusBig').innerHTML = bal <= 0 ? '<h2 class="text-success fw-bold border border-success p-2 d-inline-block">✅ FULLY PAID</h2>' : '';
            
            const logs = document.getElementById('logs'); 
            logs.innerHTML = "";
            const history = c.payments || [];
            history.sort((a, b) => new Date(a.date) - new Date(b.date));
            history.forEach(p => { 
                logs.innerHTML += `<div class="d-flex justify-content-between border-bottom border-secondary py-2"><span>${p.date}</span><b>₱${p.amount.toLocaleString()}</b></div>`; 
            });
            modal.show();
        };

        window.confirmDelete = async (id, name) => {
            if(confirm(`Sigurado ka bang buburahin si ${name}?`)){
                const docRef = doc(db, "clients", id);
                const res = await getDoc(docRef);
                lastDeleted = res.data();
                await deleteDoc(docRef);
                document.getElementById('undoToast').style.display = 'block';
                setTimeout(()=> document.getElementById('undoToast').style.display='none', 5000);
                load();
            }
        };

        window.undoDelete = async () => {
            if(lastDeleted) {
                await addDoc(collection(db, "clients"), lastDeleted);
                lastDeleted = null;
                document.getElementById('undoToast').style.display = 'none';
                load();
            }
        };

        document.getElementById('payBtn').onclick = async () => {
            const id = document.getElementById('clientSel').value; 
            const amt = Number(document.getElementById('amt').value);
            const chosenDate = document.getElementById('payDate').value;

            if(!id || !amt) return alert("Paki-pili ang client at amount!");
            
            const finalDate = chosenDate ? new Date(chosenDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : new Date().toLocaleDateString();

            const ref = doc(db, "clients", id); 
            const res = await getDoc(ref); 
            const c = res.data();
            
            try {
                await updateDoc(ref, { 
                    paid: (c.paid || 0) + amt, 
                    payments: [...(c.payments || []), { amount: amt, date: finalDate }] 
                });
                alert("Payment Success!"); 
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        window.confirmDelete = confirmDelete;
        window.showHistory = showHistory;
        window.undoDelete = undoDelete;
        load();
    </script>
</body>
</html>
