<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamondland - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: #161616; padding: 40px; border-radius: 15px; border: 1px solid #333; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(241, 196, 15, 0.1); }
        .gold-text { color: #f1c40f; }
        .input-dark { background: #1a1a1a; border: 1px solid #333; color: white; margin-bottom: 15px; padding: 12px; }
        .input-dark:focus { background: #222; border-color: #f1c40f; color: white; box-shadow: none; }
        .btn-gold { background: linear-gradient(180deg, #f1c40f 0%, #c9a01b 100%); border: none; font-weight: bold; width: 100%; padding: 12px; color: black; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="gold-text fw-bold mb-4">DIAMONDLAND</h2>
        <input type="email" id="email" class="form-control input-dark" placeholder="Email Address">
        <input type="password" id="password" class="form-control input-dark" placeholder="Password">
        <button class="btn btn-gold" id="loginBtn">LOG IN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY-MhEi5XevlyqsmZHcuAxVYhnP_gsxqI",
            authDomain: "payment-tracker-3f604.firebaseapp.com",
            projectId: "payment-tracker-3f604",
            appId: "1:899123374357:web:08870171e6f89bd8d3a11c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "dashboard.html";
            } catch (err) { alert("Mali ang Email o Password!"); }
        };
    </script>
</body>
</html>
